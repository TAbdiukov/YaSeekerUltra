name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        # Reference: https://github.com/orgs/community/discussions/26944#discussioncomment-10256620
        # How to fix ANSI color codes w/ GH actions:
        shell: 'script -q -e -c "export TERM=xterm-256color; bash --noprofile --norc -eo pipefail {0}"'
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check
      - name: Compile
        run: python -m compileall

      - name: Run pytest
        run: python -m pytest
